# Publishes the Vite `dist/` folder only. Required repo setting:
# Settings → Pages → Build and deployment → Source: **GitHub Actions**
# If Source is "Deploy from a branch" (e.g. main / root), the live site serves
# the raw repo (index.html → /src/main.jsx), causing MIME errors and no /assets/ bundle.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]

# Opt into Node 24 for Actions until it becomes the default (see GitHub changelog)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist
          # Keep dotfiles (e.g. `.nojekyll` from Vite public/) so GitHub Pages skips Jekyll
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
